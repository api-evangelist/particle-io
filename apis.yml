apis:
- aid: particle-io:particle-device-cloud-api
  name: Particle Device Cloud API
  description: The Particle Device Cloud REST API is the primary interface to the Particle platform. Use it to claim and manage
    devices, list and call cloud functions, read cloud variables, subscribe to events, manage webhooks and integrations,
    administer products and fleets, manage SIM cards, and orchestrate OTA firmware updates.
  humanURL: https://docs.particle.io/reference/cloud-apis/api/
  baseURL: https://api.particle.io
  tags:
  - Cloud Functions
  - Devices
  - Events
  - Fleet Management
  - Integrations
  - Variables
  - Webhooks
  properties:
  - type: Documentation
    url: https://docs.particle.io/reference/cloud-apis/api/
  - type: Authentication
    url: https://docs.particle.io/reference/cloud-apis/access-tokens/
- aid: particle-io:particle-oauth-api
  name: Particle OAuth 2.0 API
  description: OAuth 2.0 endpoints for creating, listing, and deleting access tokens used to authenticate against the Particle
    Device Cloud API.
  humanURL: https://docs.particle.io/reference/cloud-apis/access-tokens/
  baseURL: https://api.particle.io
  tags:
  - Access Tokens
  - Authentication
  - OAuth2
  properties:
  - type: Documentation
    url: https://docs.particle.io/reference/cloud-apis/access-tokens/
- aid: particle-io:particle-devices-api
  name: Particle Devices API
  description: List, claim, rename, and inspect Particle devices, request remote diagnostics and vitals, and control device
    signal LEDs.
  humanURL: https://docs.particle.io/reference/cloud-apis/api/#devices
  baseURL: https://api.particle.io
  tags:
  - Devices
  - Diagnostics
  - Vitals
  properties:
  - type: Documentation
    url: https://docs.particle.io/reference/cloud-apis/api/#devices
- aid: particle-io:particle-functions-variables-api
  name: Particle Functions and Variables API
  description: Invoke cloud-callable firmware functions and read cloud-exposed variables on Particle devices.
  humanURL: https://docs.particle.io/reference/cloud-apis/api/#functions
  baseURL: https://api.particle.io
  tags:
  - Cloud Functions
  - Devices
  - Variables
  properties:
  - type: Documentation
    url: https://docs.particle.io/reference/cloud-apis/api/#functions
- aid: particle-io:particle-events-api
  name: Particle Events API
  description: Publish events from the cloud to devices and subscribe to a Server-Sent Events stream of device, product, or
    public events.
  humanURL: https://docs.particle.io/reference/cloud-apis/api/#events
  baseURL: https://api.particle.io
  tags:
  - Events
  - Pub Sub
  - SSE
  properties:
  - type: Documentation
    url: https://docs.particle.io/reference/cloud-apis/api/#events
- aid: particle-io:particle-webhooks-api
  name: Particle Webhooks and Integrations API
  description: Create and manage webhooks and integrations that forward device events to external services such as Azure IoT
    Hub, Google Cloud Pub/Sub, and arbitrary HTTP endpoints.
  humanURL: https://docs.particle.io/reference/cloud-apis/api/#integrations-webhooks
  baseURL: https://api.particle.io
  tags:
  - Integrations
  - Webhooks
  properties:
  - type: Documentation
    url: https://docs.particle.io/reference/cloud-apis/api/#integrations-webhooks
- aid: particle-io:particle-products-api
  name: Particle Products API
  description: Manage product fleets including importing and listing devices, configuring OAuth clients, and orchestrating
    OTA firmware releases across product devices.
  humanURL: https://docs.particle.io/reference/cloud-apis/api/#products
  baseURL: https://api.particle.io
  tags:
  - Fleet Management
  - OTA
  - Products
  properties:
  - type: Documentation
    url: https://docs.particle.io/reference/cloud-apis/api/#products
- aid: particle-io:particle-sims-api
  name: Particle SIM Cards API
  description: List, activate, deactivate, and inspect Particle cellular SIM cards including data usage and network status.
  humanURL: https://docs.particle.io/reference/cloud-apis/api/#sim-cards
  baseURL: https://api.particle.io
  tags:
  - Cellular
