aid: particle-io
name: Particle
description: Particle is an end-to-end IoT platform combining cellular and Wi-Fi connectivity, hardware modules (Photon,
  Boron, Tracker, B-SoM, M-SoM), firmware, and a Device Cloud. The Particle Device Cloud exposes a REST API for fleet management,
  device control, cloud functions and variables, webhooks and integrations, OTA firmware updates, SIM management, and customer
  and product administration.
