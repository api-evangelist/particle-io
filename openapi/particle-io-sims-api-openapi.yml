openapi: 3.1.0
info:
  title: Particle Cloud Access Tokens Sims API
  description: 'The Particle Cloud API exposes IoT device management, product fleet

    management, OAuth client and token administration, diagnostics, SIM

    management and user account endpoints.

    '
  version: 1.0.0
  contact:
    name: Particle
    url: https://docs.particle.io/reference/cloud-apis/api/
servers:
- url: https://api.particle.io
  description: Particle Cloud production
security:
- BearerAuth: []
tags:
- name: Sims
paths:
  /v1/sims:
    get:
      summary: List SIM cards
      responses:
        '200':
          description: A list of SIMs.
      tags:
      - Sims
  /v1/sims/{iccid}:
    get:
      summary: Get SIM information
      parameters:
      - in: path
        name: iccid
        required: true
        schema:
          type: string
      responses:
        '200':
          description: SIM details.
      tags:
      - Sims
  /v1/sims/{iccid}/status:
    get:
      summary: Get SIM cellular network status
      parameters:
      - in: path
        name: iccid
        required: true
        schema:
          type: string
      responses:
        '200':
          description: SIM status.
      tags:
      - Sims
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: OAuth2 access token
      description: 'Pass `Authorization: Bearer {access_token}`. Tokens are issued via

        `POST /oauth/token`.

        '
